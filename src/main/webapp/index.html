<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Prime Number Checker</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    form { border: 1px solid #ccc; padding: 20px; border-radius: 5px; width: 300px; }
    label { display: block; margin-bottom: 5px; }
    input[type="text"] { width: calc(100% - 10px); padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 3px; }
    input[type="submit"] { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 3px; cursor: pointer; }
    input[type="submit"]:hover { background-color: #45a049; }
    h2 { color: #333; }
</style>
</head>
<body>
    <h2>Prime Number Checker</h2>
    <form action="primeChecker" method="post">
        <label for="numberInput">Enter a number:</label>
        <input type="text" id="numberInput" name="numberInput" required>
        <input type="submit" value="Check Prime">
    </form>
</body>
</html>
